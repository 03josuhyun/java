<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script>
    $(function(){
      $('#menu li:first').css('background-color','yellow');
      $('#menu li:last').css('background-color','pink');
      //menu의 li의 첫번째와 마지막에게

      $('#menu li:even').css('border','2px solid pink');
      $('#menu li:odd').css('border','1px solid yellow');
      //menu의 even은 짝수, odd는 홀수

      $('li:first-of-type').css('background-color','yellow');
      $('li:last-of-type').css('background-color','pink');
      //모든 li 중 첫번째와 마지막에게

      $('li:nth-child(3n)').css('background-color','blue');
      //모든 li 중 3의 배수에게
      $('li:nth-child(2)').css('background-color','white').css('color','brown');
      //모든 li 중 2에게만

      $('li:only-child').css('background-color','yellow');
      $('#first_list li').slice(2).css('color','red')

      $('a[title]').css('background-color','brown');
      $('a[href="http://www.nate.com"]').css('background-color','pink');
      $('a[href^="mailto"]').css('background-color','aqua');
      $('a[href$="net"]').css('background-color','purple');
      $('a[href*="google"]').css('background-color','orange');

      $('p:visible').css('border','1px solid red');
      $('p:hidden').css('display','block');
      //원래는 안보이지만 보이게 만듦

      $('.text').css('border','1px dashed #f00');
      $(':checked').attr('checked',false);
      $(':selected').attr('selected',false);

      $('#menu li:contains("내용3")').css('border','1px dashed purple');
      $('#menu li:has("strong")').css('background-color','yellow');
      $('menu li').not(':first').css('background-color','orange');
      $('#menu li:eq(1)').find('strong').css('font-size','22px');
      $('#menu').closest('div').css('border','5px double green');

      $('li').filter('.st1').css('background-color','skyblue');
      $('li').contents().css('border','1px solid red');

      $('#menu').children('li:eq(1)').css('border','1px dashed red').end().css('border','5px double orange');
    });//jqurey
  </script>
  <style>
    /*---------------default_setting----------------*/
    * {margin: 0; padding: 0;}
    li{list-style: none;}
    a {color: black; text-decoration: none;}
    /*----------------------------------------------*/
  </style>
</head>
<body>
  <h1>탐색 선택자</h1>
  <ul id="menu">
    <li>내용1</li>
    <li>내용2</li>
    <li>내용3</li>
    <li>내용4</li>
  </ul><br>
  <ul>
    <li>내용5</li>
    <li>내용6</li>
    <li>내용7</li>
    <li>내용8</li>
  </ul><br>

  <ul id="first_list">
    <li>내용1</li>
    <li>내용2</li>
    <li>내용3</li>
    <li>내용4</li>
  </ul>
  <ul>
    <li>내용5</li>
  </ul><br>

  <ul>
    <li><a href="http://www.naver.com" title="네이버 이동">네이버</a></li>
    <li><a href="http://www.nate.com">네이트</a></li>
    <li><a href="http://www.daum.net">다음</a></li>
    <li><a href="http://www.google.com">구글</a></li>
    <li><a href="mailto:ciycc@naver.com">관리자에게</a></li>
  </ul><br>

  <h1>탐색 선택자</h1>
  <p>내용1</p>
  <p style="display: none;">내용2</p><br>
  
  <h1>탐색 선택자</h1>
  <p>
    <label for="user_name">이름</label>
    <input type="text" name="user_name" id="user_name">
  </p>
  <p>
    <input type="checkbox" name="accept" id="accept" checked="checked">
    <label for="accept">사용자 동의</label>
  </p>
  <p>
    <select name="rel_site" id="resl_site">
      <option value="네이버">네이버</option>
      <option value="네이트" selected="selected">네이트</option>
    </select>
  </p><br>

  <div id="wrap">
    <div id="inner_wrap">
      <ul id="menu">
        <li>내용</li>
        <li>
          <span>
            내용<strong>2</strong>
          </span>
        </li>
        <li><a href="#">내용3</a></li>
        <li>내용4</li>
        <li>내용5</li>
      </ul>
    </div>
  </div><br>

  <ul>
    <li class="st1">내용1</li>
    <li>
      <span><strong>내용2</strong></span>
    </li>
    <li class="st1">내용3</li>
  </ul><br>

  <ul id="menu">
    <li>내용1</li>
    <li>내용2</li>
    <li>내영3</li>
  </ul>
</body>
</html>
