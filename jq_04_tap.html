      const tap = $('.notice .tap .li');
      const sheet = $('.notice .sheet div');
      let index = 0;

      tap.click(function(){
        index = $(this).index();//뭘 눌렀는지 모르기 때문에 this
        tap.removeclass('on_tap');
        tap.eq(index).addClass('on_tap');

        sheet.removeClass('on_sheet');
        sheet.eq(index).addClass('on_sheet');
      });//tap_click_event
    });//jqurey

  <style>
    /*---------------default_setting----------------*/
    * {margin: 0; padding: 0;}
    li{list-style: none;}
    a {color: black; text-decoration: none;}
    /*----------------------------------------------*/
    .notice {
      width: 500px;
      margin: 0 auto;
    }
    .notice .tap {overflow: hidden;}
    .notice .tap li {
      width: 100px; height: 50px;
      background-color: #ccc;
      text-align: center;
      line-height: 50px;
      border-radius: 10px 10px 0 0;
      float: left;
      cursor: pointer;
    }
    /*.notice .tap .tap01 {background-color: yellow;}*/
    .notice .tap .on_tap {background-color: yellow;}
    .notice .sheet .on_sheet {display: block;}
    .notice .sheet div {
      width: 500px; height: 500px;
      background-color: yellow;
      text-align: center;
      line-height: 500px;
      display: none;
    }
