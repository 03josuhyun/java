<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-mousewheel/3.2.2/jquery.mousewheel.min.js"></script>
  <script src="./main.js"></script>
  <style>
    /*---------------default_setting----------------*/
    * {margin: 0; padding: 0;}
    li{list-style: none;}
    a {color: black; text-decoration: none;}
    /*----------------------------------------------*/
    .wrap {}
    .wrap section {
      width: 100%; height: 100vh;
      border: 1px solid black;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .wrap section .sub_box {
      width: 940px; height: 300px;
      background-color: #eee;
    }
    .wrap section .sub_box div {
      width: 300px; height: 300px;
      border: 1px solid black;
      box-sizing: border-box;
      background-color: #ccc;
      float: left;
    }
    .wrap section .sub_box div:nth-child(2){
      margin: 0 20px;
    }
    .wrap .page01 .sub_box {
      opacity: 0;
      animation: intro 3s;
      animation-fill-mode: forwards;
      /*fill-mode 계산하기 싫을때*/
    }
    @keyframes intro {
      0% {opacity: 0;}
      100% {opacity: 1;}
    }
    .page02 .sub_box div {
      display: none;
    }
    .page03 .sub_box {
      position: relative;
    }
    .page03 .sub_box div {
      position: absolute;
      bottom: -300px;
    }
    .page03 .sub_box .page03_1 { left: 0; }
    .page03 .sub_box .page03_2 { left: 300px; margin: 0;}
    .page03 .sub_box .page03_3 { left: 640px; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="page01">
      <div class="sub_box">
        <h1>Intro</h1>
      </div>
    </section><!--page01-->
    <section class="page02">
      <div class="sub_box">
        <div class="page02_1">page02_1</div>
        <div class="page02_2">page02_2</div>
        <div class="page02_3">page02_3</div>
      </div>
    </section><!--page02-->
    <section class="page03">
      <div class="sub_box">
        <div class="page03_1">page03_1</div>
        <div class="page03_2">page03_2</div>
        <div class="page03_3">page03_3</div>
      </div>
    </section><!--page03-->
  </div><!--wrap-->
</body>
</html>
