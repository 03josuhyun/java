<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bxslider@4.2.17/dist/jquery.bxslider.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bxslider@4.2.17/dist/jquery.bxslider.min.js"></script>
  <script>
    $(function () {
      $('.bxslider').bxSlider({
        /*mode: 'fade',*/
        captions: true,
        slideWidth: 300,
        auto :true,
        speed:300
      });
    });//jqurey
  </script>
  <style>
    /*---------------default_setting----------------*/
    * {
      margin: 0;
      padding: 0;
    }

    li {
      list-style: none;
    }

    a {
      color: black;
      text-decoration: none;
    }

    /*----------------------------------------------*/
    .bx-prev {
      width: 50px; height: 50px;
    }
    .bx-prev img {
      width: 100%;
    }
  </style>
</head>

<body>
  <div class="bxslider">
    <div><img src="./img/spring.jpg" title="season01" /></div>
    <div><img src="./img/summer.jpg" title="season02" /></div>
    <div><img src="./img/fall.jpg" title="season03" /></div>
    <div><img src="./img/winter.jpg" title="season04" /></div>
  </div>
</body>

</html>
