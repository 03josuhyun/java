<html lang="ko">
<head>
  <meta charset="UTF-8">

  <title></title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script>
    $(function(){
      /*
      $('.btn').click(function(){
        $('.text').css('color','red');
      });//btn_click_event

      $('.btn').on('click focus',function(){
        $('.text').css('background-color','yellow');
      });//두개의 액션을 하나에다가 걸어줄 수 있음

      $('.btn').mouseover(function(){
        $(this).css('font-size','24px');
      });//btn_mouseover_event //이벤트 주체와 이벤트 받을 것이 같으면 this 사용할 수 있음
      $('.btn').mouseout(function(){
        $('.btn').css('font-size','16px');

     $('ifame').load(function(){
      $('#wrap').append('<p>로딩완료</p>');
     });
     $(document).ready(function(){
      $('#wrap').append('<p>레디완료</p>');
     });*/

     $('#btn1').click(function(){
      $('#p1').css('background-color','yellow');
     });
     $('#btn2').dblclick(function(){
      $('#p1').css('background-color','purple');
     });
     $('#btn2').dblclick();
     

     $('#btn3').click(function(){
      $('#p2').css('background-color','purple');
      return false;
     });
     $('#btn4').click(function(e){
      e.preventDefault();
      $('#p2').css('background-color','yellow');
     });
     $('#btn5').click(function(){
      $('#p2').css('background-color','aqua');
     });

     $('#btn6').mouseover(function(){
      $('#p3').css('backgroud-color','yellow');
     });
     $('#btn6').mouseout(function(){
      $('#p3').css('background-color','orange');
     });
     $('#btn7').mouseover(function(){
      $('#p3').css('background-color','red');
     });
     $('#btn7').mouseout(function(){
      $('#p3').css('backgroud-color','purple');
     });

     $('#wrap1').mouseout(function(){
      $('#p4').css('border','2px solid red');
     });
     $('#wrap1').mouseleave(function(){
      $('#p4').css('border','2px solid yellow');
     });

     $(document).mousemove(function(e){
      var x=e.pageX;
      var y=e.pageY;
      $('#p5').text('x:'+x+'y:'+y);
     });

     $('#user_name').focus();
     $('#user_id').focus(function(){
      $(this).val('');
     });
     $('user_id').blur(function(){
      $(this).val('아이디 입력');
     });

     $('#btn8').mouseover(function(){
      alert('good');
     });
     $('#btn9').on('mouseover focus',function(){
      alert('hello');
     });

     /*$('#user_id1').keydown(function(){
      $(this).css('background-color','purple');
      $('#txt1').text(e.keyCode);
     });*/
    $('#user_id1').keypress(function(){
      $('#txt2').text(e.keyCode);
     });
     $('#user_id1').keyup(function(){
      $(this).css('background-color','orange');
     });

     $('#rel_site').change(function(){
      $('#txt').text($(this).val());
     });

     $(window).scroll(function(){
      $('#txt4').text($(this).scrollTop());
     });

     $('#menu a').mouseover(function(){
      $('#menu a').css('background','none');
      $(this).css('background-color','yellow');
      var num=$('#menu a').index(this);
      $(".txt").text(num);     
     })

     $('.gnb_btn').mouseover(function(){
      $('.gnb_down_menu').slideDown(300);
     });
    });//jqurey
  </script>
  <style>
    /*---------------default_setting----------------*/
    * {margin: 0; padding: 0;}
    li{list-style: none;}
    a {color: black; text-decoration: none;}
    /*----------------------------------------------*/
    #wrap1 {
      background-color: #ccc;
      padding: 10px;
    }
    #p4 {background-color: #999;}

    #txt4 {
      position: fixed;
      top: 10px;
      left: 10px;
    }

    .gnb {
      width: 1070px; height: 70px;
      margin: 0 auto;
    }
    .gnb .gnb_menu {overflow: hidden;}
    .gnb .gnb_menu .gnb_btn {
      width: 70px; height: 70px;
      border: 1px solid black;
      box-sizing: border-box;
      text-align: center;
      line-height: 70px;
      float: left;
    }
    .gnb .gnb_menu ul {
      width: 1000px;
      display: flex;
    }
    .gnb .gnb_menu ul li {
      flex-grow: 1;
      background-color: burlywood;
      text-align: center;
      line-height: 70px;
    }
    .gnb .gnb_down_menu {
      width: 1070px; height: 300px;
      text-align: center;
      line-height: 300px;
      border: 1px solid black;
      box-sizing: border-box;
      display: none;
    }
  </style>
</head>
<body>
  <!--<button class="btn">click</button>
  <div class="text">Event_test</div>-->

  <div id="wrap"></div>
  <iframe src="http://www.easyspub.com/" frameborder="0" width="500" height="200"></iframe><br>

  <button id="btn1">click</button>
  <button id="btn2">dbclick</button>
  <p id="p1">내용</p><br>

  <a href="http://w3.org/" id="btn3">버튼1</a>
  <a href="http://w3.org/" id="btn4">버튼2</a>
  <a href="http://w3.org/" id="btn5">버튼3</a>
  <p id="p2">내용</p><br>

  <button id="btn6">mouseover/out</button>
  <button id="btn7">hover</button>
  <p id="p3">내용</p><br>

  <div id="wrap1">
    <p id="p4">내용</p>
  </div><br>

  <p id="p5"></p><br>

  <p id="p6">
    <input type="text" name="user_name" id="user_name">
  </p>
  <p id="p7">
    <input type="text" name="user_id" id="user_id" value="아이디 입력">
  </p><br>

  <p id="p8"><a href="#" id="btn8">버튼1</a></p>
  <p id="p9"><a href="#" id="btn9">버튼2</a></p><br>

  <p id="p10"><input type="text" name="user_id1" id="user_id1"></p>
  <p id="txt1"></p>
  <p id="txt2"></p><br>

  <select id="rel_site">
    <option value="">사이트 선택</option>
    <option value="www.naver.com">네이버</option>
    <option value="www.nate.com">네이트</option>
    <option value="www.daum.net">다음</option>
  </select>
  <p id="txt"></p><br>

  <p id="txt3">0</p><br>

  <ul id="menu">
    <li><a href="#">내용1</a></li>
    <li><a href="#">내용2</a></li>
    <li><a href="#">내용3</a></li>
    <li><a href="#">내용4</a></li>
  </ul>
  <p class="txt"></p><br>

  <h1 id="h1"><a href="#">버튼</a></h1>
  <h2></h2><br>

  <nav class="gnb">
    <div class="gnb_menu">
      <div class="gnb_btn">메뉴</div>
      <ul>
        <li>menu1</li>
        <li>menu2</li>
        <li>menu3</li>
        <li>menu4</li>
      </ul>
    </div>
    <div class="gnb_down_menu">
      gnb_down_menu
    </div>
  </nav>
</body>
</html>
