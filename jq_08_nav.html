<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <!--jQurey_Library-->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-scrollTo/2.1.3/jquery.scrollTo.min.js"></script>

  <script>
    $(function(){
      $(window).scroll(function(){
        if($(window).scrollTop()>=200){
          $('.gnb').addClass('fixed');
          $('.btn_top').fadeIn(300);
        }else {
          $('.gnb').removeClass('fixed');
          $('.btn_top').fadeOut(300);
        }
      });//scroll_event

      $('.btn_top').click(function(e){
        e.preventDefault();
        // $('html, body').stop().animate({
        //   scrollTop : 0
        // },1000);
        //모바일이나 반응형에 사용할 수 있음, 내장함수

        //$(window).scrollTo({top:0, left:0},1000);

        $(window).scrollTo(this.hash || 0, 1000);
        //hash일땐 id 필요, ||로 인해 hash또는0임
      });//btn_top_click_event
    });//jqurey
  </script>
  <style>
    /*---------------default_setting----------------*/
    * {margin: 0; padding: 0;}
    li{list-style: none;}
    a {color: black; text-decoration: none;}
    /*----------------------------------------------*/
    body {
      height: 3000px;
    }
    .header {
      width: 100%; height: 200px;
      background-color: cadetblue;
      text-align: center;
      line-height: 200px;
    }
    .gnb {
      width: 100%; height: 50px;
      background-color: darkseagreen;
      text-align: center;
      line-height: 50px;
      /*position: fixed;
      top: 0; left: 0;*/
    }
    .fixed {
      position: fixed;
      top: 0; left: 0;
      background-color: olivedrab;
    }
    .btn_top {
      display: block;
      width: 50px; height: 50px;
      background-color: red;
      color: white;
      text-align: center;
      line-height: 50px;
      font-weight: bolder;
      border-radius: 50%;
      position: fixed;
      bottom: 50px; right: 50px;
      display: none;
      /*opacity:0 굳이 할 필요없음*/
    }
  </style>
</head>
<body>
  <header class="header" id="header">
    <h1>header</h1>
  </header>
  <nav class="gnb">
    <h1>gnb</h1>
  </nav>
  <a href="#header" class="btn_top">top</a>
</body>
</html>
