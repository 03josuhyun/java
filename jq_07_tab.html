<!DOCTYPE html>

  <title></title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script>
    function on(object) {
      object.src = object.src.replace('_off','_on');
    };
    function off(object) {
      object.src = object.src.replace('_on','_off');
    };
    //js
  </script>

    section div {
      width: 200px; height: 200px;
      margin-right: 10px;
    }
    section div img {
      width: 100%; height: auto;
    }
  </style>
</head>
<body>

  <div><img src="./img/spring_off.jpg" alt="spring_thumnail" onmouseover="on(this)" onmouseout="off(this)"></div>
